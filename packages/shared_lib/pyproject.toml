[project]
name = "shared-lib"
version = "0.1.0"
description = "Shared database models and utilities"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "pydantic-settings>=2.12.0",
    "tortoise-orm[asyncpg]>=0.25.3,<1.0.0",
    "aiosqlite>=0.17.0",
    "loguru>=0.7.3",
    "qqwry-py3>=1.2.1"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

